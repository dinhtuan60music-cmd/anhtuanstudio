<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tìm Album - Anh Tuấn Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--orange:#e11d25;--orange-light:#ff5b62;--orange-dark:#79070b;--text:#fff;--muted:#bdbdbd;--panel:rgba(7,7,7,.96);--border:rgba(225,29,37,.38)}
    html{scroll-behavior:smooth}
    body{min-height:100vh;overflow-x:hidden;color:var(--text);font-family:"Be Vietnam Pro",Arial,Helvetica,sans-serif;background:radial-gradient(circle at 50% 0%,rgba(225,29,37,.12),transparent 34%),linear-gradient(180deg,#080808 0%,#030303 52%,#020202 100%)}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%} button,input{font:inherit}
    .container{width:min(1180px,calc(100% - 36px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(225,29,37,.16);background:rgba(3,3,3,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .nav-wrap{min-height:70px;display:flex;align-items:center;justify-content:space-between;gap:24px}
    .brand{display:flex;align-items:center;gap:11px;color:var(--orange);font-family:"Manrope",sans-serif;font-weight:800;letter-spacing:.7px}
    .brand img{width:38px;height:38px;object-fit:contain}
    .main-nav{display:flex;align-items:center;gap:24px}.main-nav a{color:#f4f4f4;font-size:14px;transition:.2s ease}.main-nav a:hover,.main-nav a.active{color:var(--orange)}
    .hero{padding:78px 0 28px;text-align:center;background:radial-gradient(circle at 50% 24%,rgba(225,29,37,.15),transparent 28%),linear-gradient(180deg,rgba(225,29,37,.035),transparent)}
    .hero span{display:block;margin-bottom:14px;color:var(--orange);font-size:12px;font-weight:900;letter-spacing:5px}
    .hero h1{max-width:920px;margin:0 auto;font-size:clamp(48px,6vw,76px);line-height:1.02;font-weight:900;letter-spacing:-2px;text-shadow:0 14px 36px rgba(0,0,0,.5)}
    .hero p{max-width:760px;margin:22px auto 0;color:var(--muted);font-size:16px;line-height:1.7}
    .search-section{padding:10px 0 16px}.search-panel{padding:16px;border:1px solid rgba(255,72,78,.72);border-radius:20px;box-shadow:0 0 24px rgba(225,29,37,.12),inset 0 1px 0 rgba(255,255,255,.06);background:linear-gradient(145deg,rgba(225,29,37,.07),transparent 34%),rgba(12,8,5,.88);box-shadow:0 24px 60px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.03)}
    .search-box{min-height:58px;padding:0 18px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.09);border-radius:15px;background:rgba(255,255,255,.035)}
    .search-icon{color:var(--orange);font-size:22px}.search-box input{width:100%;border:0;outline:0;color:var(--text);background:transparent;font-size:16px}.search-box input::placeholder{color:#a99787}
    .album-section{padding:16px 0 58px}.album-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .album-card{padding:22px;border:1px solid rgba(255,72,78,.72);border-radius:20px;box-shadow:0 18px 46px rgba(0,0,0,.35),0 0 20px rgba(225,29,37,.08),inset 0 1px 0 rgba(255,255,255,.05);background:linear-gradient(145deg,rgba(225,29,37,.07),transparent 34%),var(--panel);box-shadow:0 18px 46px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.03)}
    .album-card-top{display:grid;grid-template-columns:78px minmax(0,1fr);align-items:center;gap:14px}.album-avatar{width:78px;height:78px;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,72,78,.66);border-radius:17px;background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(225,29,37,.02)),rgba(7,7,7,.9);box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}
    .album-avatar img{width:100%;height:100%;object-fit:cover}.album-avatar img.logo-fallback{width:58%;height:58%;object-fit:contain}
    .album-card h2{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:24px;line-height:1.15}.album-card small{display:block;margin-top:7px;color:var(--muted);font-size:11px;line-height:1.5}
    .album-link{min-height:40px;margin-top:16px;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;color:#ffffff;border:1px solid var(--orange-light);border-radius:999px;background:linear-gradient(145deg,#ff5a61,#c70d14 56%,#70070b);font-size:10px;font-weight:900}
    .empty-message{grid-column:1/-1;padding:34px 20px;color:var(--muted);text-align:center;border:1px dashed rgba(225,29,37,.28);border-radius:18px;background:rgba(255,255,255,.025);font-size:14px;line-height:1.6}
    footer{border-top:1px solid rgba(225,29,37,.14);background:#020202}.footer-content{min-height:96px;padding:16px 0 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);text-align:center;line-height:1.4}.footer-content p{margin:0;font-size:11px}.footer-content strong{display:block;margin-bottom:2px;color:#ff4c53;font-size:14px}.footer-content img{order:2;width:30px;height:30px;object-fit:contain}
    @media(max-width:900px){.album-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:700px){
      .container{width:min(100% - 24px,1180px)}.nav-wrap{min-height:66px;gap:10px}.brand{gap:8px}.brand img{width:32px;height:32px}.brand span{max-width:90px;font-size:12px;line-height:1.15}.main-nav{gap:10px}.main-nav a{font-size:12px}.main-nav a:nth-child(2){display:none}
      .hero{padding:24px 0 10px}.hero span{margin-bottom:7px;font-size:9px;letter-spacing:3px}.hero h1{max-width:100%;margin:0 auto;font-size:20px;line-height:1.15;letter-spacing:0}.hero p{display:none}
      .search-section{padding:4px 0 8px}.search-panel{padding:8px;border-radius:15px}.search-box{min-height:44px;padding:0 12px;gap:9px;border-radius:12px}.search-icon{font-size:18px}.search-box input{font-size:14px}.search-box input::placeholder{font-size:12px}
      .album-section{padding:8px 0 42px}.album-grid{grid-template-columns:1fr;gap:12px}.album-card{padding:16px}.album-card-top{grid-template-columns:66px minmax(0,1fr);gap:12px}.album-avatar{width:66px;height:66px;border-radius:15px}.album-card h2{font-size:20px}.album-card small{font-size:10px}.album-link{min-height:36px;padding:0 14px;font-size:9px}.empty-message{padding:26px 16px;font-size:12px}
      .footer-content{min-height:88px;padding:14px 0 10px}.footer-content p{font-size:10.5px;white-space:nowrap}.footer-content strong{font-size:13px}.footer-content img{width:27px;height:27px}
    }
  </style>
</head>
<body>
  <header class="topbar"><div class="container nav-wrap"><a class="brand" href="index.html"><img src="logo.png" alt="Anh Tuấn Studio" /><span>ANH TUẤN STUDIO</span></a><nav class="main-nav"><a href="index.html">Trang chủ</a><a href="index.html#customers">Khách hàng</a><a href="music.html">Nghe nhạc</a><a class="active" href="albums.html">Tìm Album</a><a href="tel:0868930933">Liên hệ</a></nav></div></header>
  <main>
    <section class="hero"><div class="container"><span>ALBUM KHÁCH HÀNG</span><h1>Tìm album theo tên khách hàng</h1><p>Nhập tên khách hàng để mở album riêng và nghe toàn bộ bài hát trực tuyến được thực hiện tại Anh Tuấn Studio.</p></div></section>
    <section class="container search-section"><div class="search-panel"><label class="search-box"><span class="search-icon">⌕</span><input id="albumSearch" type="search" placeholder="Nhập tên khách hàng..." autocomplete="off" /></label></div></section>
    <section class="container album-section"><div id="albumGrid" class="album-grid"></div></section>
  </main>
  <footer><div class="container footer-content"><img src="logo.png" alt="Anh Tuấn Studio" /><p><strong>ANH TUẤN STUDIO</strong>Trảng Bom · Đồng Nai · 0868 930 933</p></div></footer>
  <script src="customers.js"></script>
  <script>
    const albumSearch=document.getElementById('albumSearch');
    const albumGrid=document.getElementById('albumGrid');
    function normalizeText(text){return String(text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d')}
    function getPlayableSongs(customer){return (customer.songs||[]).filter(song=>typeof song.listenLink==='string'&&song.listenLink.trim()!=='')}
    function renderAlbums(keyword=''){
      const searchText=keyword.trim();
      const normalizedKeyword=normalizeText(searchText);
      albumGrid.innerHTML='';
      if(!searchText){albumGrid.innerHTML='<div class="empty-message">Nhập tên khách hàng, mã khách hoặc tên bài hát để tìm album.</div>';return}
      const matchingCustomers=customers.filter(customer=>{const playableSongs=getPlayableSongs(customer);const customerName=normalizeText(customer.name);const customerId=normalizeText(customer.id);const hasMatchingSong=playableSongs.some(song=>normalizeText(song.title).includes(normalizedKeyword));return playableSongs.length>0&&(customerName.includes(normalizedKeyword)||customerId.includes(normalizedKeyword)||hasMatchingSong)});
      if(matchingCustomers.length===0){albumGrid.innerHTML='<div class="empty-message">Không tìm thấy album phù hợp.<br />Anh chị vui lòng kiểm tra lại tên khách hàng, mã khách hoặc tên bài hát.</div>';return}
      matchingCustomers.forEach(customer=>{const playableSongs=getPlayableSongs(customer);const card=document.createElement('article');card.className='album-card';const avatarPath=customer.avatar||'logo.png';const fallbackClass=customer.avatar?'':'logo-fallback';card.innerHTML=`<div class="album-card-top"><div class="album-avatar"><img class="${fallbackClass}" src="${avatarPath}" alt="${customer.name}" /></div><div><h2>${customer.name}</h2><small>${playableSongs.length} bài hát trực tuyến<br />Thực hiện tại Anh Tuấn Studio</small></div></div><a class="album-link" href="album.html?id=${encodeURIComponent(customer.id)}">XEM ALBUM</a>`;albumGrid.appendChild(card)});
    }
    albumSearch.addEventListener('input',()=>renderAlbums(albumSearch.value));
    renderAlbums('');
  </script>
</body>
</html>
