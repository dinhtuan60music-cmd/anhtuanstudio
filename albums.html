<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tìm album khách hàng - Anh Tuấn Studio</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #ff8614;
      --orange-light: #ffb35d;
      --orange-dark: #b94c00;
      --text: #fff8f0;
      --muted: #b8a99b;
      --panel: rgba(18, 13, 9, 0.94);
      --border: rgba(255, 134, 20, 0.25);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 134, 20, 0.15), transparent 34%),
        linear-gradient(180deg, #130c07 0%, #060403 52%, #020202 100%);
    }

    button,
    input,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5, 4, 3, 0.92);
      border-bottom: 1px solid rgba(255, 134, 20, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav-wrap {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--orange);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .brand img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .main-nav a {
      color: #eee3d8;
      text-decoration: none;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .main-nav a:hover,
    .main-nav a.active {
      color: var(--orange);
    }

    .hero {
  padding: 48px 0 20px;
  text-align: center;
}

    .hero span {
      display: inline-block;
      margin-bottom: 15px;
      color: var(--orange);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 5px;
    }

  .hero h1{
  font-size:clamp(34px,5vw,68px);
  line-height:1.05;
  margin-top:8px;
}

    .hero p {
  max-width: 700px;
  margin: 14px auto 0;
  color: var(--muted);
  line-height: 1.55;
  font-size: 14px;
}

    .search-panel {
  margin-bottom: 22px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 18px;
  background:
    linear-gradient(135deg, rgba(255, 134, 20, 0.08), transparent 42%),
    rgba(18, 13, 9, 0.92);
  box-shadow: 0 16px 38px rgba(0, 0, 0, 0.22);
}

   .search-box {
  min-height: 42px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 9px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.04);
}

.search-icon {
  color: var(--orange);
  font-size: 16px;
}

.search-box input {
  width: 100%;
  color: white;
  border: none;
  outline: none;
  background: transparent;
  font-size: 13px;
}

.search-box input::placeholder {
  color: #8e8175;
  font-size: 13px;
}

.album-section{
    padding-top:4px;
    padding-bottom:60px;
}
    

    
    .album-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}

.album-card{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  background:
    linear-gradient(145deg,rgba(255,134,20,.07),transparent 55%),
    var(--panel);
  box-shadow:
    0 10px 24px rgba(0,0,0,.20),
    inset 0 1px 0 rgba(255,255,255,.03);
  transition:.22s ease;
}

.album-card:hover{
  border-color:rgba(255,134,20,.38);
  transform:translateY(-2px);
  box-shadow:0 18px 38px rgba(0,0,0,.28);
}

.album-card-top{
  display:flex;
  align-items:center;
  gap:12px;
}

.album-avatar{
  width:54px;
  height:54px;
  flex:0 0 54px;
  display:grid;
  place-items:center;
  overflow:hidden;
  border:1px solid rgba(255,134,20,.18);
  border-radius:13px;
  background:rgba(255,134,20,.06);
}

.album-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.album-avatar img.logo-fallback{
  width:50%;
  height:50%;
  object-fit:contain;
}

.album-card h2{
  font-size:17px;
  font-weight:700;
  line-height:1.2;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.album-card small{
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-size:10px;
  line-height:1.35;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.album-link{
  margin-top:auto;
  min-height:34px;
  padding:0 14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#160902;
  text-decoration:none;
  border:1px solid var(--orange-light);
  border-radius:999px;
  background:linear-gradient(135deg,var(--orange-light),var(--orange-dark));
  font-size:10px;
  font-weight:900;
  letter-spacing:.5px;
  transition:.2s ease;
}

.album-link:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(255,110,0,.18);
}

.empty-message{
  grid-column:1/-1;
  padding:24px 14px;
  color:var(--muted);
  text-align:center;
  font-size:12px;
  line-height:1.6;
  border:1px dashed rgba(255,134,20,.24);
  border-radius:15px;
  background:rgba(255,255,255,.025);
}

footer {
  border-top: 1px solid rgba(255, 134, 20, 0.14);
  background: #040302;
}

.footer-content {
  min-height: 96px;
  padding: 16px 0 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--muted);
  text-align: center;
  line-height: 1.4;
}

.footer-content p {
  margin: 0;
  font-size: 11px;
}

.footer-content strong {
  display: block;
  margin-bottom: 2px;
  font-size: 14px;
}

.footer-content img {
  order: 2;
  width: 26px;
  height: 26px;
  object-fit: contain;
}

    @media (max-width: 900px) {
      .album-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {

      .hero{
    padding:28px 0 10px;
}

.hero span{
    font-size:11px;
    letter-spacing:5px;
}

.hero h1{
    font-size:48px;
    line-height:1.05;
}

.hero p{
    margin-top:12px;
    font-size:15px;
    line-height:1.6;
}


      
  .container { width: min(100% - 24px, 1180px); }
  .nav-wrap { min-height: 66px; gap: 12px; }
  .brand { gap: 9px; }
  .brand img { width: 34px; height: 34px; }
  .brand span { max-width: 95px; font-size: 13px; line-height: 1.15; }
  .main-nav { gap: 11px; }
  .main-nav a { font-size: 12px; }
  .main-nav a:nth-child(2) { display: none; }

  .hero { padding: 28px 0 16px; }
  .hero span { margin-bottom: 9px; font-size: 10px; letter-spacing: 3px; }
  .hero h1 { font-size: 34px; line-height: 1.06; letter-spacing: -1px; }
  .hero p { margin-top: 10px; font-size: 12px; line-height: 1.5; }

  .search-panel{
    margin-top:-6px;
    padding:8px 0 14px;
}

      
  .search-box { min-height: 40px; padding: 0 12px; }
  .search-box input,
  .search-box input::placeholder { font-size: 12px; }

  .album-grid { grid-template-columns: 1fr; gap: 10px; }
  .album-card { padding: 12px; gap: 9px; }
  .album-avatar { width: 50px; height: 50px; flex-basis: 50px; }
  .album-card h2 { font-size: 16px; }
  .album-card small { font-size: 9.5px; }
  .album-link { min-height: 32px; font-size: 9.5px; }

  .footer-content { min-height: 88px; padding: 14px 0 10px; gap: 5px; }
  .footer-content p { margin: 0; font-size: 10.5px; line-height: 1.35; white-space: nowrap; }
  .footer-content strong { font-size: 13px; }
  .footer-content img { width: 24px; height: 24px; }
}
</style>
</head>

<body>
  <header class="topbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="Anh Tuấn Studio" />
        <span>ANH TUẤN STUDIO</span>
      </a>

  <nav class="main-nav">
    <a href="index.html">Trang chủ</a>
    <a href="index.html#customers">Khách hàng</a>
    <a href="music.html">Nghe nhạc</a>
    <a class="active" href="albums.html">Tìm Album</a>
    <a href="tel:0868930933">Liên hệ</a>
</nav>
      
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <span>ALBUM KHÁCH HÀNG</span>
        <h1>Tìm album theo tên khách hàng</h1>
        <p>
          Nhập tên khách hàng để mở album riêng và nghe toàn bộ bài hát trực tuyến
          được thực hiện tại Anh Tuấn Studio.
        </p>
      </div>
    </section>

    <section class="container">
      <div class="search-panel">
        <label class="search-box">
          <span class="search-icon">⌕</span>

          <input
  id="albumSearch"
  type="search"
  placeholder="Nhập tên khách hàng..."
  autocomplete="off"
  autofocus
/>

          
        </label>
      </div>
    </section>

    <section class="container album-section">
      <div id="albumGrid" class="album-grid"></div>
    </section>
  </main>

  <footer>
    <div class="container footer-content">
      <img src="logo.png" alt="Anh Tuấn Studio" />

      <p>
        <strong>ANH TUẤN STUDIO</strong><br />
        Trảng Bom · Đồng Nai · 0868 930 933
      </p>
    </div>
  </footer>

  
  <script src="customers.js"></script>

<script>
  const albumSearch = document.getElementById("albumSearch");
  const albumGrid = document.getElementById("albumGrid");

  function normalizeText(text) {
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/đ/g, "d");
  }

  function getPlayableSongs(customer) {
    return (customer.songs || []).filter((song) => {
      return (
        typeof song.listenLink === "string" &&
        song.listenLink.trim() !== ""
      );
    });
  }

  function renderAlbums(keyword = "") {
    const searchText = keyword.trim();
    const normalizedKeyword = normalizeText(searchText);

    albumGrid.innerHTML = "";

    // Chưa nhập nội dung thì không hiện album khách hàng
    if (!searchText) {
      albumGrid.innerHTML = `
        <div class="empty-message">
          Nhập tên khách hàng, mã khách hoặc tên bài hát để tìm album.
        </div>
      `;
      return;
    }

    const matchingCustomers = customers.filter((customer) => {
      const playableSongs = getPlayableSongs(customer);

      const customerName = normalizeText(customer.name);
      const customerId = normalizeText(customer.id);

      const hasMatchingSong = playableSongs.some((song) => {
        return normalizeText(song.title).includes(normalizedKeyword);
      });

      return (
        playableSongs.length > 0 &&
        (
          customerName.includes(normalizedKeyword) ||
          customerId.includes(normalizedKeyword) ||
          hasMatchingSong
        )
      );
    });

    if (matchingCustomers.length === 0) {
      albumGrid.innerHTML = `
        <div class="empty-message">
          Không tìm thấy album phù hợp.<br />
          Anh chị vui lòng kiểm tra lại tên khách hàng, mã khách hoặc tên bài hát.
        </div>
      `;
      return;
    }

    matchingCustomers.forEach((customer) => {
      const playableSongs = getPlayableSongs(customer);
      const card = document.createElement("article");

      card.className = "album-card";

      const avatarPath = customer.avatar || "logo.png";
      const fallbackClass = customer.avatar ? "" : "logo-fallback";

      card.innerHTML = `
        <div class="album-card-top">
          <div class="album-avatar">
            <img
              class="${fallbackClass}"
              src="${avatarPath}"
              alt="${customer.name}"
            />
          </div>

          <div>
            <h2>${customer.name}</h2>

            <small>
              ${playableSongs.length} bài hát trực tuyến<br />
              Thực hiện tại Anh Tuấn Studio
            </small>
          </div>
        </div>

        <a
          class="album-link"
          href="album.html?id=${encodeURIComponent(customer.id)}"
        >
          XEM ALBUM
        </a>
      `;

      albumGrid.appendChild(card);
    });
  }

  albumSearch.addEventListener("input", () => {
    renderAlbums(albumSearch.value);
  });

  renderAlbums("");
  setTimeout(() => {
  albumSearch.focus();
}, 200);

  
</script>

</body>
</html>
