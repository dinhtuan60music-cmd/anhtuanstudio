<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop - Anh Tuấn Studio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;color:#fff;font-family:Arial,sans-serif;
      background:radial-gradient(circle at 50% 0%,rgba(225,29,37,.18),transparent 38%),#030303}
    .box{width:min(620px,calc(100% - 32px));padding:48px 28px;text-align:center;border:1px solid rgba(225,29,37,.45);
      border-radius:24px;background:rgba(8,8,8,.92);box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 30px rgba(225,29,37,.12)}
    h1{font-size:clamp(34px,7vw,58px)}
    p{margin:14px 0 28px;color:#bdbdbd;line-height:1.7}
    a{display:inline-flex;min-height:44px;padding:0 20px;align-items:center;color:#fff;text-decoration:none;border-radius:999px;
      background:linear-gradient(145deg,#ff555c,#c70d14 56%,#70070b);font-weight:800}
  </style>
</head>
<body>
  <main class="box">
    <h1>SHOP</h1>
    <p>Gian hàng thiết bị thu âm của Anh Tuấn Studio đang được hoàn thiện.</p>
    <a href="index.html">TRỞ VỀ TRANG CHỦ</a>
  </main>
</body>
</html>
